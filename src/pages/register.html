<!DOCTYPE html>
<html>

<head>
    <title>StarryCDN - Register</title>
    <link rel="stylesheet" href="style/register.css">
</head>

<body>

    <h1 id="mainHeader">StarryCDN</h1>
    <h2 id="subHeader">Registeration</h2>

    <div class="registerContainer">
        <div class="inputBox">
            <div class="headers">
                <h1>Username</h1>
                <h2 id="errorHeaderA">Regiseration Failed.</h2>
            </div>
            <input type="text" id="usernameInput" minlength="1">
        </div>
        <div class="inputBox">
            <div class="headers">
                <h1>Password</h1>
                <h2 id="errorHeaderB">Regiseration Failed.</h2>
            </div>
            <input type="password" id="passwordInput" minlength="1">
        </div>
        <div class="buttonBox">
            <button onclick="onRegister()" id="registerButton">Register</button>
        </div>
    </div>

    <a id="loginRedir" href="/login">Back to login</a>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="scripts/authentication.js"></script>

</body>

</html>
