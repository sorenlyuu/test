<!DOCTYPE html>
<html>

<head>
    <title>StarryCDN - Home</title>
    <link rel="stylesheet" href="style/home.css">
</head>

<body>
    <h1 id="mainHeader">StarryCDN</h1>
    <div class="mainContainer">
        <div class="uploadContainer">
            <div class="fileInput">
                <h1>Upload a file</h1>
                <h2 id="errorHeader">Uploading Failed!</h2>
            </div>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="file" id="file" name="file">
                <button type="button" onclick="onUpload()">Upload</button>
            </form>
        </div>
        <div class="fileContainer">
            <h1>Uploads</h1>
            <div class="fileItemsWrapper"></div>
        </div>
    </div>
    <button id="logoutButton" type="button" onclick="onLogout()">Logout</button>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="scripts/upload.js"></script>
    <script src="scripts/authentication.js"></script>
    <script src="scripts/files.js"></script>
</body>

</html>
