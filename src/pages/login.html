<!DOCTYPE html>
<html>

<head>
    <title>StarryCDN - Login</title>
    <link rel="stylesheet" href="style/login.css">
</head>

<body>

    <h1 id="mainHeader">StarryCDN</h1>
    <h2 id="loginTip">Please login to proceed!</h2>

    <div class="loginContainer">
        <div class="inputBox">
            <div class="headers">
                <h1>Username</h1>
                <h2 id="errorHeaderA">Invalid Username or Password!</h2>
            </div>
            <input type="text" id="usernameInput" minlength="1">
        </div>
        <div class="inputBox">
            <div class="headers">
                <h1>Password</h1>
                <h2 id="errorHeaderB">Invalid Username or Password!</h2>
            </div>
            <input type="password" id="passwordInput" minlength="1">
        </div>
        <div class="buttonBox">
            <button onclick="onLogin()" id="loginButton">Login</button>
            <a href="/register">
                <button id="registerButton">Register</button>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="scripts/authentication.js"></script>

</body>

</html>
